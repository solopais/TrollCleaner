name: TrollCleaner
options:
  bundleIdPrefix: com.trollcleaner
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  TrollCleaner:
    type: application
    platform: iOS
    sources:
      - Sources/TrollCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trollcleaner.app
        PRODUCT_NAME: TrollCleaner
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrollCleaner.entitlements
    info:
      path: Resources/Info.plist
    entitlements:
      path: TrollCleaner.entitlements
